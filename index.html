<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Budget Planner</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<header>

    <h1>💰 Budget Planner</h1>

    <p>
        Quản lý chi tiêu thông minh theo độ tuổi,
        giới tính, nghề nghiệp và thu nhập
    </p>

</header>


<div class="container">

<!-- ========================= -->
<!-- FORM -->
<!-- ========================= -->

<div class="card">

<h2>Thông tin cá nhân</h2>


<div class="form-group">

<label>Độ tuổi</label>

<select id="age">

<option value="">-- Chọn độ tuổi --</option>

<option value="student">11 - 17 tuổi</option>

<option value="university">18 - 22 tuổi</option>

<option value="worker">23 - 55 tuổi</option>

<option value="retired">56 tuổi trở lên</option>

</select>

</div>



<div class="form-group">

<label>Giới tính</label>

<select id="gender">

<option value="">-- Chọn giới tính --</option>

<option value="male">Nam</option>

<option value="female">Nữ</option>

</select>

</div>



<div class="form-group">

<label>Nghề nghiệp</label>

<select id="job">

<option value="">-- Chọn nghề nghiệp --</option>

<option value="student">Học sinh</option>

<option value="university">Sinh viên</option>

<option value="worker">Người đi làm</option>

<option value="retired">Người nghỉ hưu</option>

</select>

</div>



<!-- JS sinh ra -->

<div id="dynamicFields"></div>



<div class="form-group">

<label>

Ngân sách / Thu nhập mỗi tháng

</label>

<input
type="number"
id="budget"
placeholder="Ví dụ: 6000000">

</div>



<!-- Tiền trọ -->

<div
class="form-group"
id="rentGroup"
style="display:none;">

<label>

Tiền trọ
(Đã bao gồm điện, nước và Internet)

</label>

<input
type="number"
id="rentCost"
placeholder="Ví dụ: 2500000">

</div>



<div class="form-group">

<label>

Sở thích

</label>

<div id="hobbyContainer">

</div>

</div>



<button id="generateBtn">

📊 Lập kế hoạch chi tiêu

</button>

</div>





<!-- ====================== -->
<!-- RESULT -->
<!-- ====================== -->

<div
id="resultSection">

<div class="welcome">

<h2>

👋 Chào mừng

</h2>

<p>

Hãy nhập đầy đủ thông tin
để nhận gợi ý chi tiêu.

</p>

</div>

</div>




<!-- ====================== -->
<!-- BIỂU ĐỒ -->
<!-- ====================== -->

<div class="card">

<h2>

Biểu đồ chi tiêu

</h2>

<canvas id="budgetChart">

</canvas>

</div>

</div>




<footer>

<p>

© 2026 Budget Planner

</p>

</footer>



<script src="data.js"></script>

<script src="script.js"></script>

</body>

</html>
